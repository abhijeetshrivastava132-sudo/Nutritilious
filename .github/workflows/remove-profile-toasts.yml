name: Apply Nutritilious UI patches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add Hindi language translation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')

          # Keep previous popup removals safe.
          text = re.sub(r"^\s*showToast\('Edit details'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(r"^\s*showToast\('Details saved'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(r"^\s*showToast\('Logged out'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(
              r"\s*setTimeout\(\(\) => \{\n\s*window\.location\.href = 'login\.html';\n\s*\}, 500\);",
              "\n      window.location.href = 'login.html';",
              text,
              flags=re.MULTILINE
          )

          translation_block = r'''
    // Language translation start
    const translations = {
      English: {
        deliverTo: 'Deliver to',
        selectArea: 'Select your area',
        searchPlaceholder: 'Search, order and enjoy',
        onlyVeg: 'Only Veg',
        craving: 'What are you craving?',
        suggested: 'Suggested for you',
        categories: ['Breakfast', 'Lunch', 'Dinner', 'Snacks', 'Desserts', 'Beverages'],
        filters: ['Filters', 'Rating 4.0+', 'Fast Delivery', 'Pure Veg', 'Under ₹120'],
        unavailableTitle: 'We are not there yet!',
        unavailableText: 'Sorry, our services are currently unavailable at this location. We hope to serve you in the future.',
        nav: ['Home', 'Orders', 'Cart', 'Subscription', 'Profile'],
        selectLocation: 'Select location',
        addExactAddress: 'Add exact address',
        housePlaceholder: 'House / Flat / Floor',
        streetPlaceholder: 'Street / Area / Landmark',
        saveAddress: 'Save address',
        notifications: 'Notifications',
        noNotification: 'No notification yet!',
        orders: 'Orders',
        noOrders: 'No orders yet!',
        cart: 'Cart',
        cartEmpty: 'Cart is empty',
        subscription: 'Subscription',
        comingSoon: 'Coming soon',
        profile: 'Profile',
        personalDetails: 'Personal Details',
        fullName: 'Full Name',
        namePlaceholder: 'Enter your name',
        phoneNumber: 'Phone Number',
        phonePlaceholder: 'Add phone number',
        email: 'Email',
        emailPlaceholder: 'Add email address',
        saveDetails: 'Save Details',
        editDetails: 'Edit Details',
        language: 'Language',
        languageValue: 'English',
        helpSupport: 'Help & Support',
        helpText: 'Report issue or contact Nutritilious',
        logout: 'Logout',
        chooseLanguage: 'Choose your language',
        languageNames: { English: 'English', Hindi: 'Hindi' },
        statusDetecting: 'Detecting your live location...',
        addHouseMsg: 'Please add house/flat or street/area.',
        exactAddressSaved: 'Exact address saved.',
        locationUnsupported: 'Location is required but not supported on this device.',
        liveDetectedAddress: 'Live location detected. Add house/street and save exact address.',
        permissionRequired: 'Location permission is required to continue. Please allow location access.',
        liveDetected: 'Live location detected',
        languageSelected: 'Language selected',
        helpToast: 'Help and support page coming soon'
      },
      Hindi: {
        deliverTo: 'डिलीवर करें',
        selectArea: 'अपना क्षेत्र चुनें',
        searchPlaceholder: 'सर्च करें, ऑर्डर करें और आनंद लें',
        onlyVeg: 'केवल वेज',
        craving: 'आप क्या खाना चाहेंगे?',
        suggested: 'आपके लिए सुझाव',
        categories: ['नाश्ता', 'लंच', 'डिनर', 'स्नैक्स', 'मिठाई', 'पेय'],
        filters: ['फ़िल्टर', 'रेटिंग 4.0+', 'फास्ट डिलीवरी', 'शुद्ध वेज', '₹120 से कम'],
        unavailableTitle: 'हम अभी यहां उपलब्ध नहीं हैं!',
        unavailableText: 'माफ़ करें, हमारी सेवा अभी इस लोकेशन पर उपलब्ध नहीं है। हम भविष्य में आपकी सेवा करना चाहेंगे।',
        nav: ['होम', 'ऑर्डर', 'कार्ट', 'सब्सक्रिप्शन', 'प्रोफाइल'],
        selectLocation: 'लोकेशन चुनें',
        addExactAddress: 'सटीक पता जोड़ें',
        housePlaceholder: 'घर / फ्लैट / फ्लोर',
        streetPlaceholder: 'गली / एरिया / लैंडमार्क',
        saveAddress: 'पता सेव करें',
        notifications: 'नोटिफिकेशन',
        noNotification: 'अभी कोई नोटिफिकेशन नहीं!',
        orders: 'ऑर्डर',
        noOrders: 'अभी कोई ऑर्डर नहीं!',
        cart: 'कार्ट',
        cartEmpty: 'कार्ट खाली है',
        subscription: 'सब्सक्रिप्शन',
        comingSoon: 'जल्द आ रहा है',
        profile: 'प्रोफाइल',
        personalDetails: 'पर्सनल डिटेल्स',
        fullName: 'पूरा नाम',
        namePlaceholder: 'अपना नाम डालें',
        phoneNumber: 'फोन नंबर',
        phonePlaceholder: 'फोन नंबर जोड़ें',
        email: 'ईमेल',
        emailPlaceholder: 'ईमेल एड्रेस जोड़ें',
        saveDetails: 'डिटेल्स सेव करें',
        editDetails: 'डिटेल्स एडिट करें',
        language: 'भाषा',
        languageValue: 'हिंदी',
        helpSupport: 'हेल्प और सपोर्ट',
        helpText: 'समस्या रिपोर्ट करें या Nutritilious से संपर्क करें',
        logout: 'लॉगआउट',
        chooseLanguage: 'अपनी भाषा चुनें',
        languageNames: { English: 'अंग्रेज़ी', Hindi: 'हिंदी' },
        statusDetecting: 'आपकी लाइव लोकेशन ढूंढी जा रही है...',
        addHouseMsg: 'कृपया घर/फ्लैट या गली/एरिया जोड़ें।',
        exactAddressSaved: 'सटीक पता सेव हो गया।',
        locationUnsupported: 'इस डिवाइस पर लोकेशन सपोर्ट नहीं है।',
        liveDetectedAddress: 'लाइव लोकेशन मिल गई। घर/गली जोड़कर सटीक पता सेव करें।',
        permissionRequired: 'आगे बढ़ने के लिए लोकेशन परमिशन जरूरी है। कृपया लोकेशन एक्सेस दें।',
        liveDetected: 'लाइव लोकेशन मिल गई',
        languageSelected: 'भाषा चुनी गई',
        helpToast: 'हेल्प और सपोर्ट पेज जल्द आएगा'
      }
    };

    function getText(key) {
      const dictionary = translations[profileSelectedLanguage] || translations.English;
      return dictionary[key] || translations.English[key] || '';
    }

    function setText(selector, value) {
      const element = document.querySelector(selector);
      if (element) element.textContent = value;
    }

    function setAllText(selector, values) {
      document.querySelectorAll(selector).forEach((element, index) => {
        if (values[index]) element.textContent = values[index];
      });
    }

    function translateStatusText() {
      const allStatuses = [...Object.values(translations.English), ...Object.values(translations.Hindi)]
        .filter(value => typeof value === 'string');
      if (!statusBox.textContent.trim() || allStatuses.includes(statusBox.textContent.trim())) {
        statusBox.textContent = getText('statusDetecting');
      }
    }

    function applyLanguageText() {
      const dictionary = translations[profileSelectedLanguage] || translations.English;
      document.documentElement.lang = profileSelectedLanguage === 'Hindi' ? 'hi' : 'en';

      const locationTitle = document.querySelector('.location-title');
      if (locationTitle && locationTitle.childNodes.length) locationTitle.childNodes[0].nodeValue = dictionary.deliverTo + ' ';
      if (!homeLocationText.textContent.trim() || homeLocationText.textContent === translations.English.selectArea || homeLocationText.textContent === translations.Hindi.selectArea) {
        homeLocationText.textContent = dictionary.selectArea;
      }

      searchInput.placeholder = dictionary.searchPlaceholder;
      setText('.veg-toggle span:first-child', dictionary.onlyVeg);
      setAllText('.section-title', [dictionary.craving, dictionary.suggested]);
      setAllText('.cat-name', dictionary.categories);
      setAllText('.filter', dictionary.filters);
      setText('#unavailableMsg h3', dictionary.unavailableTitle);
      setText('#unavailableMsg p', dictionary.unavailableText);
      setAllText('.bottom-nav .nav-item span', dictionary.nav);

      setText('.location-panel-title', dictionary.selectLocation);
      setText('.manual-title', dictionary.addExactAddress);
      houseInput.placeholder = dictionary.housePlaceholder;
      streetInput.placeholder = dictionary.streetPlaceholder;
      saveAddress.textContent = dictionary.saveAddress;

      setText('#notificationPage .notify-title', dictionary.notifications);
      setText('#notificationPage .empty-notify h2', dictionary.noNotification);
      setText('#ordersPage .notify-title', dictionary.orders);
      setText('#ordersPage .empty-notify h2', dictionary.noOrders);
      setText('#cartPage .notify-title', dictionary.cart);
      setText('#cartPage .empty-notify h2', dictionary.cartEmpty);
      setText('#subscriptionPage .notify-title', dictionary.subscription);
      setText('#subscriptionPage .empty-notify h2', dictionary.comingSoon);
      setText('#profilePage .notify-title', dictionary.profile);

      setText('.profile-v2-form-card h2', dictionary.personalDetails);
      setAllText('.profile-v2-group label', [dictionary.fullName, dictionary.phoneNumber, dictionary.email]);
      profileNameInput.placeholder = dictionary.namePlaceholder;
      profilePhoneInput.placeholder = dictionary.phonePlaceholder;
      profileEmailInput.placeholder = dictionary.emailPlaceholder;
      profileSaveBtn.textContent = profileDetailsLocked ? dictionary.editDetails : dictionary.saveDetails;

      const menuTitles = document.querySelectorAll('.profile-v2-menu-row strong');
      if (menuTitles[0]) menuTitles[0].textContent = dictionary.language;
      if (menuTitles[1]) menuTitles[1].textContent = dictionary.helpSupport;
      const menuSubtexts = document.querySelectorAll('.profile-v2-menu-row small');
      if (menuSubtexts[0]) menuSubtexts[0].textContent = dictionary.languageValue;
      if (menuSubtexts[1]) menuSubtexts[1].textContent = dictionary.helpText;
      profileLanguageText.textContent = dictionary.languageValue;
      profileLogoutBtn.textContent = dictionary.logout;
      setText('.profile-language-head h2', dictionary.chooseLanguage);
      profileLanguageChoices.forEach(choice => {
        const label = choice.querySelector('span:first-child');
        if (label) label.textContent = dictionary.languageNames[choice.dataset.language] || choice.dataset.language;
      });
    }
    // Language translation end
'''

          text = re.sub(r"\n    // Language translation start\n.*?\n    // Language translation end\n", "\n", text, flags=re.S)
          text = text.replace("    let profileDetailsLocked = false;\n", "    let profileDetailsLocked = false;\n\n" + translation_block + "\n", 1)

          text = re.sub(
              r"    function setProfileLanguage\(language\) \{.*?\n    \}\n\n    function setProfileDetailsLocked",
              "    function setProfileLanguage(language) {\n"
              "      profileSelectedLanguage = language;\n"
              "      profileLanguageChoices.forEach(choice => {\n"
              "        choice.classList.toggle('active', choice.dataset.language === language);\n"
              "      });\n"
              "      setProfileValue('Language', language);\n"
              "      applyLanguageText();\n"
              "    }\n\n"
              "    function setProfileDetailsLocked",
              text,
              flags=re.S,
              count=1
          )

          text = text.replace(
              "      profileSaveBtn.textContent = isLocked ? 'Edit Details' : 'Save Details';",
              "      profileSaveBtn.textContent = isLocked ? getText('editDetails') : getText('saveDetails');"
          )

          replacements = {
              "statusBox.textContent = 'Please add house/flat or street/area.';": "statusBox.textContent = getText('addHouseMsg');",
              "const address = cleanAddress([house, street, base && base !== 'Select your area' ? base : '']);": "const address = cleanAddress([house, street, base && base !== translations.English.selectArea && base !== translations.Hindi.selectArea ? base : '']);",
              "statusBox.textContent = 'Exact address saved.';": "statusBox.textContent = getText('exactAddressSaved');",
              "statusBox.textContent = 'Location is required but not supported on this device.';": "statusBox.textContent = getText('locationUnsupported');",
              "statusBox.textContent = 'Detecting your live location...';": "statusBox.textContent = getText('statusDetecting');",
              "statusBox.textContent = 'Live location detected. Add house/street and save exact address.';": "statusBox.textContent = getText('liveDetectedAddress');",
              "statusBox.textContent = 'Location permission is required to continue. Please allow location access.';": "statusBox.textContent = getText('permissionRequired');",
              "return 'Live location detected';": "return getText('liveDetected');",
              "showToast(`${choice.dataset.language} selected`);": "showToast(getText('languageSelected'));",
              "profileHelpBtn.onclick = () => showToast('Help and support page coming soon');": "profileHelpBtn.onclick = () => showToast(getText('helpToast'));"
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          text = text.replace(
              "    if (savedProfileLanguage) setProfileLanguage(savedProfileLanguage);\n\n    setProfileDetailsLocked(Boolean(savedProfileName || savedProfilePhone || savedProfileEmail));",
              "    if (savedProfileLanguage) setProfileLanguage(savedProfileLanguage);\n    else applyLanguageText();\n\n    setProfileDetailsLocked(Boolean(savedProfileName || savedProfilePhone || savedProfileEmail));\n    applyLanguageText();"
          )

          index_path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Add Hindi language page translation"
            git push
          fi

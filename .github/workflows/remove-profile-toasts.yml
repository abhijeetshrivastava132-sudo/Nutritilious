name: Remove profile toast popups

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-toasts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove profile toast popups
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          text = index_path.read_text(encoding='utf-8')

          text = re.sub(r"^\s*showToast\('Edit details'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(r"^\s*showToast\('Details saved'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(r"^\s*showToast\('Logged out'\);\n", "", text, flags=re.MULTILINE)
          text = re.sub(
              r"\s*setTimeout\(\(\) => \{\n\s*window\.location\.href = 'login\.html';\n\s*\}, 500\);",
              "\n      window.location.href = 'login.html';",
              text,
              flags=re.MULTILINE
          )

          index_path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Remove profile toast popups"
            git push
          fi

name: Location card patch

on:
  push:
    paths:
      - 'location-card-patch-trigger.txt'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch detected location display
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace("['nutritiliousLiveLocation','nutritiliousLatitude','nutritiliousLongitude','nutritiliousHouse','nutritiliousStreet']", "['nutritiliousLiveLocation','nutritiliousDetectedLocation','nutritiliousLatitude','nutritiliousLongitude','nutritiliousHouse','nutritiliousStreet']")

          s = s.replace(
              "baseLocation=await reverseGeocode(pos.coords.latitude,pos.coords.longitude);setLocationName(baseLocation);showDetectedLocation(baseLocation);",
              "baseLocation=await reverseGeocode(pos.coords.latitude,pos.coords.longitude);localStorage.setItem('nutritiliousDetectedLocation',baseLocation);setLocationName(baseLocation);showDetectedLocation(baseLocation);"
          )

          s = s.replace(
              "setLocationName(address);showDetectedLocation(baseLocation||address);statusBox.style.color='#267e3e';",
              "setLocationName(address);if(baseLocation)showDetectedLocation(baseLocation);else hideDetectedLocation();statusBox.style.color='#267e3e';"
          )

          s = s.replace(
              "const savedLocation=localStorage.getItem('nutritiliousLiveLocation');if(savedLocation){baseLocation=savedLocation;setLocationName(savedLocation)}else setTimeout(openLocationSheet,500);",
              "const savedLocation=localStorage.getItem('nutritiliousLiveLocation'),savedDetectedLocation=localStorage.getItem('nutritiliousDetectedLocation');if(savedLocation){baseLocation=savedDetectedLocation||savedLocation;setLocationName(savedLocation)}else setTimeout(openLocationSheet,500);"
          )

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit index patch
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Show only detected location in detected box"
          git push

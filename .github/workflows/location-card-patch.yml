name: Location card patch

on:
  push:
    paths:
      - 'location-card-patch-trigger.txt'

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch cards by location
        run: |
          python <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          replacements = [
              ('<article class="restaurant-card" data-order="1" data-veg="true"', '<article class="restaurant-card" data-area="patna" data-order="1" data-veg="true"'),
              ('<article class="restaurant-card" data-order="2" data-veg="true"', '<article class="restaurant-card" data-area="siwan" data-order="2" data-veg="true"'),
              ('<article class="restaurant-card" data-order="3" data-veg="false"', '<article class="restaurant-card" data-area="alipurduar" data-order="3" data-veg="false"'),
          ]
          for old, new in replacements:
              s = s.replace(old, new)

          old_apply = "function applyFilters(){const q=searchInput.value.trim().toLowerCase();unavailableMsg.classList.toggle('show',locationUnavailable);filterRow.classList.toggle('hide',locationUnavailable);document.querySelectorAll('.restaurant-card').forEach(card=>{if(locationUnavailable){card.style.display='none';return}const text=card.innerText.toLowerCase(),isVeg=card.dataset.veg==='true',rating=Number(card.dataset.rating||0),time=Number(card.dataset.time||999),price=Number(card.dataset.price||9999),distance=Number(card.dataset.distance||999),meal=card.dataset.meal||'',pref=card.dataset.pref||'',showSearch=!q||text.includes(q),showVeg=!(vegToggle.checked||activeFilters.veg)||isVeg,showFast=!activeFilters.fast||time<=15,showRating=!activeFilters.rating||rating>=4,showPrice=!activeFilters.price||price<=150,showMeal=!sheetFilters.meal||meal.includes(sheetFilters.meal),showPref=!sheetFilters.pref||pref.includes(sheetFilters.pref),showSheetPrice=!sheetFilters.sheetPrice||price<=Number(sheetFilters.sheetPrice),showDistance=!sheetFilters.distance||distance<=Number(sheetFilters.distance);card.style.display=showSearch&&showVeg&&showFast&&showRating&&showPrice&&showMeal&&showPref&&showSheetPrice&&showDistance?'':'none'});sortCards();updateFilterChips();updateSheetOptionState()}"
          new_apply = "function applyFilters(){const q=searchInput.value.trim().toLowerCase(),locationText=homeLocationText.textContent.toLowerCase(),selectedArea=serviceAreas.find(area=>locationText.includes(area))||'',cards=[...document.querySelectorAll('.restaurant-card')];let locationMatchedCards=0;cards.forEach(card=>{const cardArea=String(card.dataset.area||'').toLowerCase(),locationMatch=Boolean(selectedArea&&cardArea.split(' ').includes(selectedArea));if(locationMatch)locationMatchedCards++;if(!selectedArea||!locationMatch){card.style.display='none';return}const text=card.innerText.toLowerCase(),isVeg=card.dataset.veg==='true',rating=Number(card.dataset.rating||0),time=Number(card.dataset.time||999),price=Number(card.dataset.price||9999),distance=Number(card.dataset.distance||999),meal=card.dataset.meal||'',pref=card.dataset.pref||'',showSearch=!q||text.includes(q),showVeg=!(vegToggle.checked||activeFilters.veg)||isVeg,showFast=!activeFilters.fast||time<=15,showRating=!activeFilters.rating||rating>=4,showPrice=!activeFilters.price||price<=150,showMeal=!sheetFilters.meal||meal.includes(sheetFilters.meal),showPref=!sheetFilters.pref||pref.includes(sheetFilters.pref),showSheetPrice=!sheetFilters.sheetPrice||price<=Number(sheetFilters.sheetPrice),showDistance=!sheetFilters.distance||distance<=Number(sheetFilters.distance);card.style.display=showSearch&&showVeg&&showFast&&showRating&&showPrice&&showMeal&&showPref&&showSheetPrice&&showDistance?'':'none'});unavailableMsg.classList.toggle('show',!selectedArea||locationMatchedCards===0);filterRow.classList.toggle('hide',!selectedArea||locationMatchedCards===0);sortCards();updateFilterChips();updateSheetOptionState()}"
          if old_apply not in s and new_apply not in s:
              raise SystemExit('applyFilters target not found')
          s = s.replace(old_apply, new_apply)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit index patch
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Show food cards by location availability"
          git push

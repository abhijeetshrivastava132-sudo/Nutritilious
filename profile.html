<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Nutritilious Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f3f3f3;
      color: #1c1c1c;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
      outline: none;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: auto;
      background: #fff;
      padding-bottom: 90px;
    }

    .profile-header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid #f1f1f1;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .back-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f6f6f6;
      color: #111;
    }

    .back-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .hero {
      padding: 22px 16px 18px;
      background: linear-gradient(180deg, #fff 0%, #fff7f8 100%);
    }

    .account-card {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border-radius: 28px;
      background: #8b0000;
      color: #fff;
      box-shadow: 0 18px 35px rgba(139, 0, 0, 0.22);
    }

    .account-card::before {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      right: -70px;
      top: -70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
    }

    .account-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      left: -55px;
      bottom: -55px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .avatar-row {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 26px;
      font-weight: 900;
    }

    .account-name {
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.5px;
    }

    .account-meta {
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .status-pill {
      position: relative;
      z-index: 1;
      width: fit-content;
      margin-top: 18px;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .section {
      padding: 18px 16px 0;
    }

    .section-title {
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: -0.2px;
    }

    .info-card,
    .action-card,
    .edit-card {
      border: 1px solid #eeeeee;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 15px;
      border-bottom: 1px solid #f1f1f1;
    }

    .info-row:last-child {
      border-bottom: 0;
    }

    .info-label {
      color: #888;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .info-value {
      margin-top: 5px;
      color: #111;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.35;
      word-break: break-word;
    }

    .edit-card {
      padding: 15px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: #555;
      font-size: 12px;
      font-weight: 900;
    }

    .field input {
      width: 100%;
      height: 48px;
      padding: 0 13px;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      background: #fafafa;
      color: #111;
      font-size: 14px;
      font-weight: 800;
    }

    .primary-btn,
    .danger-btn {
      width: 100%;
      height: 50px;
      border-radius: 15px;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: 0.3px;
    }

    .primary-btn {
      background: #8b0000;
      color: #fff;
    }

    .danger-btn {
      margin-top: 10px;
      background: #fff1f3;
      color: #8b0000;
      border: 1px solid rgba(139, 0, 0, 0.18);
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .action-card {
      min-height: 96px;
      padding: 14px;
      text-align: left;
    }

    .action-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: #fff1f3;
      color: #8b0000;
      font-size: 17px;
      font-weight: 900;
    }

    .action-title {
      margin-top: 11px;
      color: #111;
      font-size: 14px;
      font-weight: 950;
    }

    .action-sub {
      margin-top: 4px;
      color: #777;
      font-size: 11.5px;
      font-weight: 700;
      line-height: 1.35;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      width: 100%;
      max-width: 430px;
      height: 78px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 8px;
      border-radius: 22px 22px 0 0;
      background: #fff;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.09);
      transform: translateX(-50%);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #777;
      font-size: 10px;
      font-weight: 700;
      border-radius: 16px;
    }

    .nav-item.active {
      color: #ef4f5f;
      background: #fff1f3;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      z-index: 40;
      width: calc(100% - 32px);
      max-width: 398px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="profile-header">
      <button class="back-btn" id="backBtn" type="button" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" /></svg>
      </button>
      <h1 class="header-title">Profile</h1>
    </header>

    <main>
      <section class="hero">
        <div class="account-card">
          <div class="avatar-row">
            <div class="avatar" id="avatarText">G</div>
            <div>
              <div class="account-name" id="profileName">Guest User</div>
              <div class="account-meta" id="profileMeta">Not signed in</div>
            </div>
          </div>
          <div class="status-pill" id="statusPill">Guest session</div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Account details</h2>
        <div class="info-card">
          <div class="info-row">
            <div>
              <div class="info-label">Name</div>
              <div class="info-value" id="nameValue">Guest User</div>
            </div>
          </div>
          <div class="info-row">
            <div>
              <div class="info-label">Phone</div>
              <div class="info-value" id="phoneValue">Not added</div>
            </div>
          </div>
          <div class="info-row">
            <div>
              <div class="info-label">Email</div>
              <div class="info-value" id="emailValue">Not added</div>
            </div>
          </div>
          <div class="info-row">
            <div>
              <div class="info-label">Saved location</div>
              <div class="info-value" id="locationValue">No saved location</div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Edit profile</h2>
        <div class="edit-card">
          <div class="field">
            <label for="nameInput">Your name</label>
            <input id="nameInput" type="text" placeholder="Enter your name" />
          </div>
          <div class="field">
            <label for="phoneInput">Mobile number</label>
            <input id="phoneInput" type="tel" inputmode="numeric" maxlength="10" placeholder="Enter mobile number" />
          </div>
          <button class="primary-btn" id="saveProfileBtn" type="button">SAVE PROFILE</button>
          <button class="danger-btn" id="logoutBtn" type="button">LOG OUT</button>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Quick actions</h2>
        <div class="quick-grid">
          <button class="action-card" type="button" data-action="orders">
            <div class="action-icon">O</div>
            <div class="action-title">Orders</div>
            <div class="action-sub">View your food orders</div>
          </button>
          <button class="action-card" type="button" data-action="cart">
            <div class="action-icon">C</div>
            <div class="action-title">Cart</div>
            <div class="action-sub">Check added meals</div>
          </button>
          <button class="action-card" type="button" data-action="subscription">
            <div class="action-icon">S</div>
            <div class="action-title">Subscription</div>
            <div class="action-sub">Manage tiffin plan</div>
          </button>
          <button class="action-card" type="button" data-action="support">
            <div class="action-icon">?</div>
            <div class="action-title">Support</div>
            <div class="action-sub">Get help quickly</div>
          </button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item" id="homeNav" type="button">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" type="button" data-action="orders">
        <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3z"/></svg>
        <span>Orders</span>
      </button>
      <button class="nav-item" type="button" data-action="cart">
        <svg viewBox="0 0 24 24"><path d="M6 6h15l-2 8H8L6 6z"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>
        <span>Cart</span>
      </button>
      <button class="nav-item" type="button" data-action="subscription">
        <svg viewBox="0 0 24 24"><path d="M6 4h12v16l-6-3-6 3V4z"/></svg>
        <span>Plan</span>
      </button>
      <button class="nav-item active" type="button">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.6 0 4.6-2 4.6-4.6S14.6 2.8 12 2.8 7.4 4.8 7.4 7.4 9.4 12 12 12z"/><path d="M4.6 20.2V19c0-3.1 4.2-4.8 7.4-4.8s7.4 1.7 7.4 4.8v1.2"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const profileName = document.getElementById("profileName");
    const profileMeta = document.getElementById("profileMeta");
    const avatarText = document.getElementById("avatarText");
    const statusPill = document.getElementById("statusPill");
    const nameValue = document.getElementById("nameValue");
    const phoneValue = document.getElementById("phoneValue");
    const emailValue = document.getElementById("emailValue");
    const locationValue = document.getElementById("locationValue");
    const nameInput = document.getElementById("nameInput");
    const phoneInput = document.getElementById("phoneInput");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const backBtn = document.getElementById("backBtn");
    const homeNav = document.getElementById("homeNav");
    const toast = document.getElementById("toast");

    function getJson(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "null");
      } catch (error) {
        return null;
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function getProfile() {
      const authUser = getJson("nutritiliousUser") || {};
      const savedProfile = getJson("nutritiliousProfile") || {};

      return {
        name: savedProfile.name || authUser.displayName || "Guest User",
        phone: savedProfile.phone || authUser.phone || "",
        email: authUser.email || savedProfile.email || "",
        provider: authUser.provider || localStorage.getItem("nutritiliousAuthType") || "guest",
        isAnonymous: !!authUser.isAnonymous
      };
    }

    function renderProfile() {
      const user = getProfile();
      const savedLocation = localStorage.getItem("nutritiliousLiveLocation") || localStorage.getItem("nutritiliousLocation") || "";
      const initial = (user.name || user.phone || user.email || "G").trim().charAt(0).toUpperCase();

      profileName.textContent = user.name || "Guest User";
      avatarText.textContent = initial || "G";
      nameValue.textContent = user.name || "Guest User";
      phoneValue.textContent = user.phone || "Not added";
      emailValue.textContent = user.email || "Not added";
      locationValue.textContent = savedLocation || "No saved location";
      nameInput.value = user.name && user.name !== "Guest User" ? user.name : "";
      phoneInput.value = user.phone ? user.phone.replace(/\D/g, "").slice(-10) : "";

      if (user.email) {
        profileMeta.textContent = user.email;
      } else if (user.phone) {
        profileMeta.textContent = user.phone;
      } else {
        profileMeta.textContent = "Guest account";
      }

      if (user.provider === "google") statusPill.textContent = "Signed in with Google";
      else if (user.provider === "phone") statusPill.textContent = "Signed in with phone";
      else statusPill.textContent = "Guest session";
    }

    function saveProfile() {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.replace(/\D/g, "").slice(0, 10);

      if (phone && phone.length !== 10) {
        showToast("Enter valid 10 digit mobile number");
        return;
      }

      localStorage.setItem("nutritiliousProfile", JSON.stringify({
        name: name || "Guest User",
        phone: phone ? "+91" + phone : "",
        updatedAt: new Date().toISOString()
      }));

      renderProfile();
      showToast("Profile saved");
    }

    function logout() {
      localStorage.removeItem("nutritiliousAuthType");
      localStorage.removeItem("nutritiliousUser");
      localStorage.removeItem("nutritiliousProfile");
      window.location.href = "login.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }

    phoneInput.addEventListener("input", () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, "").slice(0, 10);
    });

    saveProfileBtn.addEventListener("click", saveProfile);
    logoutBtn.addEventListener("click", logout);
    backBtn.addEventListener("click", goHome);
    homeNav.addEventListener("click", goHome);

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        if (action === "orders") showToast("Orders page coming soon");
        if (action === "cart") showToast("Cart page coming soon");
        if (action === "subscription") showToast("Subscription page coming soon");
        if (action === "support") showToast("Support coming soon");
      });
    });

    renderProfile();
  </script>
</body>
</html>

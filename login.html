<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Nutritilious Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f3f3f3;
      color: #1c1c1c;
      overflow-x: hidden;
    }

    body {
      overflow-y: hidden;
    }

    button,
    input {
      font: inherit;
      outline: none;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    .login-page {
      width: 100%;
      max-width: 430px;
      height: 100svh;
      margin: auto;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .login-top {
      background: #f6f7f9;
      padding: 16px 22px 22px;
    }

    .login-back {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: #333;
      margin-bottom: 48px;
    }

    .login-back svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2.3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-title {
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .login-subtitle {
      margin-top: 9px;
      color: #6f7177;
      font-size: 15px;
    }

    .login-body {
      flex: 1;
      padding: 24px 22px 18px;
      display: flex;
      flex-direction: column;
    }

    .field-label {
      color: #73757d;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.4px;
    }

    .phone-row {
      height: 54px;
      display: flex;
      align-items: center;
      border-bottom: 1.5px solid #d7d7d7;
    }

    .country-code {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #444;
      font-size: 17px;
      font-weight: 650;
      margin-right: 13px;
    }

    .dash {
      color: #555;
      font-size: 19px;
      font-weight: 650;
      margin-right: 13px;
    }

    .phone-input {
      flex: 1;
      border: 0;
      color: #111;
      font-size: 21px;
      font-weight: 700;
      background: transparent;
    }

    .continue-btn,
    .verify-btn {
      width: 100%;
      height: 54px;
      margin-top: 24px;
      background: #8b0000;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .verify-btn {
      margin-top: 12px;
    }

    .login-msg {
      min-height: 17px;
      margin-top: 8px;
      color: #d0342c;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .terms {
      margin-top: 5px;
      color: #3f4148;
      font-size: 14px;
      line-height: 1.45;
    }

    .terms strong {
      color: #111;
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 14px;
      color: #9a9a9a;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .or-row::before,
    .or-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ececec;
    }

    .google-btn {
      width: 100%;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 850;
    }

    .google-icon {
      width: 22px;
      height: 22px;
    }

    .skip-btn,
    .text-btn {
      width: 100%;
      margin-top: 15px;
      color: #555;
      font-size: 14px;
      font-weight: 850;
      text-align: center;
    }

    .otp-box {
      margin-top: 14px;
    }

    .otp-input {
      width: 100%;
      height: 50px;
      padding: 0 14px;
      border: 1.5px solid #ddd;
      background: #fff;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 4px;
    }

    .otp-mode .terms,
    .otp-mode .or-row,
    .otp-mode .google-btn {
      display: none;
    }

    #recaptcha-container {
      height: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <section class="login-page" id="loginPage">
    <div class="login-top">
      <button class="login-back" id="loginBack" type="button" aria-label="Back to home">
        <svg viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>

      <h1 class="login-title">LOGIN</h1>
      <p class="login-subtitle">Enter your phone number to continue</p>
    </div>

    <div class="login-body">
      <label class="field-label" for="phoneNumber">PHONE NUMBER</label>

      <div class="phone-row">
        <div class="country-code">
          <span>🇮🇳</span>
          <span>+91</span>
        </div>

        <span class="dash">-</span>

        <input
          class="phone-input"
          id="phoneNumber"
          type="tel"
          inputmode="numeric"
          maxlength="10"
          autocomplete="tel"
        />
      </div>

      <button class="continue-btn" id="continueLogin">CONTINUE</button>

      <div class="otp-box" id="otpBox" hidden>
        <input
          class="otp-input"
          id="otpInput"
          type="tel"
          inputmode="numeric"
          maxlength="6"
          placeholder="OTP"
        />

        <button class="verify-btn" id="verifyOtpBtn">VERIFY OTP</button>
        <button class="text-btn" id="changePhoneBtn">Change number</button>
      </div>

      <p class="login-msg" id="loginMsg"></p>

      <p class="terms">
        By clicking, I accept the
        <strong>Terms &amp; Conditions</strong>
        &amp;
        <strong>Privacy Policy</strong>
      </p>

      <div class="or-row">or</div>

      <button class="google-btn" id="googleLogin">
        <svg class="google-icon" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.1 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-7.9l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2C36.9 39.3 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>
        </svg>

        Continue with Google
      </button>

      <button class="skip-btn" id="skipLogin">Skip for now</button>
      <div id="recaptcha-container"></div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCzD-QcA0K-rSXM5VZYsGB2bE3FEfhkyX0",
      authDomain: "nutrilious-ceebd.firebaseapp.com",
      projectId: "nutrilious-ceebd",
      storageBucket: "nutrilious-ceebd.firebasestorage.app",
      messagingSenderId: "904909524137",
      appId: "1:904909524137:web:e20913ddbd9aa3d3856db8"
    };

    const loginPage = document.getElementById("loginPage");
    const phoneNumber = document.getElementById("phoneNumber");
    const continueLogin = document.getElementById("continueLogin");
    const googleLogin = document.getElementById("googleLogin");
    const skipLogin = document.getElementById("skipLogin");
    const loginBack = document.getElementById("loginBack");
    const loginMsg = document.getElementById("loginMsg");
    const otpBox = document.getElementById("otpBox");
    const otpInput = document.getElementById("otpInput");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const changePhoneBtn = document.getElementById("changePhoneBtn");

    let auth = null;
    let recaptchaVerifier = null;
    let confirmationResult = null;

    function initFirebase() {
      if (auth) return auth;
      if (!window.firebase) return null;
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
      return auth;
    }

    function setMsg(message, success = false) {
      loginMsg.style.color = success ? "#267e3e" : "#d0342c";
      loginMsg.textContent = message || "";
    }

    function setLoading(status) {
      continueLogin.disabled = status;
      googleLogin.disabled = status;
      skipLogin.disabled = status;
      verifyOtpBtn.disabled = status;
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function saveUser(type, user) {
      localStorage.setItem("nutritiliousAuthType", type);
      localStorage.setItem("nutritiliousUser", JSON.stringify({
        uid: user && user.uid ? user.uid : "",
        phone: user && user.phoneNumber ? user.phoneNumber : "",
        email: user && user.email ? user.email : "",
        isAnonymous: user && user.isAnonymous ? true : false,
        provider: type
      }));
      goHome();
    }

    function getAuthError(error) {
      const code = error && error.code ? error.code : "";

      if (code.includes("operation-not-allowed")) {
        return "Enable Phone, Google, or Anonymous sign-in in Firebase Console.";
      }

      if (code.includes("unauthorized-domain")) {
        return "Add this Vercel domain in Firebase Authorized domains.";
      }

      if (code.includes("invalid-phone-number")) {
        return "Enter a valid 10-digit mobile number.";
      }

      if (code.includes("popup-blocked")) {
        return "Popup blocked. Allow popups and try again.";
      }

      if (code.includes("too-many-requests")) {
        return "Too many attempts. Try again later.";
      }

      return error && error.message ? error.message : "Login failed. Check Firebase setup.";
    }

    function setupRecaptcha() {
      const firebaseAuth = initFirebase();
      if (!firebaseAuth) return null;

      if (!recaptchaVerifier) {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container", {
          size: "invisible"
        }, firebaseAuth);
      }

      return recaptchaVerifier;
    }

    async function sendOtp() {
      const mobile = phoneNumber.value.replace(/\D/g, "");

      if (mobile.length !== 10) {
        setMsg("Enter a valid 10-digit mobile number.");
        return;
      }

      const firebaseAuth = initFirebase();
      const verifier = setupRecaptcha();

      if (!firebaseAuth || !verifier) {
        setMsg("Firebase not loaded. Check internet or Firebase setup.");
        return;
      }

      setLoading(true);
      setMsg("Sending OTP...", true);

      try {
        confirmationResult = await firebaseAuth.signInWithPhoneNumber("+91" + mobile, verifier);
        otpBox.hidden = false;
        loginPage.classList.add("otp-mode");
        continueLogin.style.display = "none";
        setMsg("OTP sent. Please check your SMS.", true);
      } catch (error) {
        setMsg(getAuthError(error));
      } finally {
        setLoading(false);
      }
    }

    async function verifyOtp() {
      const otp = otpInput.value.replace(/\D/g, "");

      if (otp.length !== 6) {
        setMsg("Enter the 6-digit OTP.");
        return;
      }

      if (!confirmationResult) {
        setMsg("Send OTP first.");
        return;
      }

      setLoading(true);
      setMsg("Verifying OTP...", true);

      try {
        const result = await confirmationResult.confirm(otp);
        saveUser("phone", result.user);
      } catch (error) {
        setMsg(getAuthError(error));
      } finally {
        setLoading(false);
      }
    }

    async function googleSignIn() {
      const firebaseAuth = initFirebase();

      if (!firebaseAuth) {
        setMsg("Firebase not loaded. Check internet or Firebase setup.");
        return;
      }

      setLoading(true);
      setMsg("Opening Google sign-in...", true);

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebaseAuth.signInWithPopup(provider);
        saveUser("google", result.user);
      } catch (error) {
        setMsg(getAuthError(error));
      } finally {
        setLoading(false);
      }
    }

    async function guestLogin() {
      const firebaseAuth = initFirebase();
      setLoading(true);

      try {
        if (firebaseAuth) {
          const result = await firebaseAuth.signInAnonymously();
          saveUser("guest", result.user);
        } else {
          saveUser("guest", null);
        }
      } catch (error) {
        saveUser("guest", null);
      } finally {
        setLoading(false);
      }
    }

    phoneNumber.addEventListener("input", () => {
      phoneNumber.value = phoneNumber.value.replace(/\D/g, "").slice(0, 10);
      setMsg("");
    });

    otpInput.addEventListener("input", () => {
      otpInput.value = otpInput.value.replace(/\D/g, "").slice(0, 6);
      setMsg("");
    });

    continueLogin.addEventListener("click", sendOtp);
    verifyOtpBtn.addEventListener("click", verifyOtp);
    googleLogin.addEventListener("click", googleSignIn);
    skipLogin.addEventListener("click", guestLogin);
    loginBack.addEventListener("click", goHome);

    changePhoneBtn.addEventListener("click", () => {
      confirmationResult = null;
      otpBox.hidden = true;
      loginPage.classList.remove("otp-mode");
      continueLogin.style.display = "block";
      otpInput.value = "";
      setMsg("");
    });

    initFirebase();
  </script>
</body>
</html>
